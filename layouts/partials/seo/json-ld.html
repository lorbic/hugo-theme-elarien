<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ site.BaseURL }}",
      "url": "{{ site.BaseURL }}",
      "name": "{{ site.Title }}",
      "description": "{{ site.Params.description }}",
      "author": {
        "@type": "Person",
        "name": "{{ site.Params.author }}"
      }
    },
    {{ if .IsPage }}
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.BaseURL }}"
        }
        {{ if .Parent }}
        ,{
          "@type": "ListItem",
          "position": 2,
          "name": "{{ .Parent.Title }}",
          "item": "{{ .Parent.Permalink }}"
        }
        {{ end }}
        ,{
          "@type": "ListItem",
          "position": {{ if .Parent }}3{{ else }}2{{ end }},
          "name": "{{ .Title }}",
          "item": "{{ .Permalink }}"
        }
      ]
    },
    {
      "@type": "BlogPosting",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
      },
      "headline": "{{ .Title }}",
      "image": [
        {{ if .Params.images }}
        "{{ index .Params.images 0 | absURL }}"
        {{ else if .Params.header_img }}
        "{{ .Params.header_img | absURL }}"
        {{ else }}
        "{{ site.Params.og_image | absURL }}"
        {{ end }}
      ],
      "datePublished": "{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}",
      "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
      "author": {
        "@type": "Person",
        "name": "{{ .Params.author | default site.Params.author }}",
        "url": "{{ site.BaseURL }}"
      },
      "publisher": {
        "@type": "Organization",
        "name": "{{ site.Title }}",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ site.Params.img_logo | absURL }}"
        }
      },
      "description": "{{ .Description | default .Summary }}",
      "wordCount": "{{ .WordCount }}"
    },
    {{ end }}
    {
      "@type": "Person",
      "@id": "{{ site.BaseURL }}about/",
      "name": "{{ site.Params.author }}",
      "url": "{{ site.BaseURL }}",
      "image": "{{ site.Params.sidebar.avatar | absURL }}",
      "sameAs": [
        "https://github.com/{{ site.Params.social.github }}",
        "{{ site.Params.social.mastodon.url }}",
        "{{ site.Params.social.internet.url }}"
      ],
      "jobTitle": "Software Engineer",
      "worksFor": {
        "@type": "Organization",
        "name": "Lorbic"
      }
    }
  ]
}
</script>
